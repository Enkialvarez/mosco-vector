<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Brote de Dengue</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor-principal">
        <!-- Panel de Control (Izquierda) -->
        <aside class="panel-control">
            <h2>Configuración</h2>
            
            <div class="slider-group">
                <label>Personas iniciales: <span id="personas-val">50</span></label>
                <input type="range" id="personas-init" min="10" max="100" value="50">
            </div>

            <div class="slider-group">
                <label>Mosquitos iniciales: <span id="mosquitos-val">20</span></label>
                <input type="range" id="mosquitos-init" min="5" max="100" value="20">
            </div>

            <div class="control-group">
                <label>Estaciones:</label>
                <select id="select-estaciones">
                    <option>Verano-Otoño</option>
                    <option>Otoño-Invierno</option>
                    <option>Invierno-Primavera</option>
                    <option>Primavera-Verano</option>
                </select>
            </div>

            <div class="linea-division"></div>

            <h2>Controles</h2>
            <div class="botones-principales">
                <button id="btn-setear">Setear (Reiniciar)</button>
                <button id="btn-ejecutar">Ejecutar / Pausa</button>
            </div>

            <div class="action-buttons">
                <button id="btn-fumigar">💨 FUMIGAR</button>
            </div>

            <div class="salida-datos">
                <div><span>Personas vivas:</span> <strong id="personas-count">0</strong></div>
                <div><span>Mosquitos vivos:</span> <strong id="mosquitos-count">0</strong></div>
            </div>
        </aside>

        <!-- Vista de Simulación (Derecha) -->
        <main class="vista-simulacion-container">
            <div id="vista-simulacion" class="mundo">
                <!-- Aquí aparecerán los iconos -->
            </div>
        </main>
    </div>

    <script src="logica.js"></script>
</body>
</html>
