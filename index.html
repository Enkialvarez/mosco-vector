<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo: Control de Vectores</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div id="escenario">
        <!-- El humo de la fumigación -->
        <div id="nube-humo"></div>

        <!-- Cacharros (Focos de infección) -->
        <div class="cacharros item-1">🛞</div>
        <div class="cacharros item-2">🪣</div>
        <div class="cacharros item-3">🏺</div>

        <!-- Moscos -->
        <div class="mosco mosco-1">🦟</div>
        <div class="mosco mosco-2">🦟</div>
        <div class="mosco mosco-3">🦟</div>
        <div class="mosco mosco-4">🦟</div>
    </div>

    <!-- Panel de Comandos -->
    <div class="panel-comandos">
        <button id="btn-fumigar" class="btn-accion">💨 FUMIGAR</button>
        <button id="btn-descacharrizar" class="btn-accion">🗑️ DESCACHARRIZAR</button>
        <button id="btn-reiniciar" class="btn-secundario">Reiniciar Dinámica</button>
    </div>

    <script src="logica.js"></script>
</body>
</html>
